spring:
  jpa:
    show-sql: true

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}

  data:
    mongodb:
      uri: ${MONGODB_URI}
      auto-index-creation: true
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: false

logging:
  level:
    root: INFO
    com.maestros: DEBUG

app:
  security:
    require-https: false
    cors:
      allowed-origins: "http://localhost:3000,http://localhost:4200"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false

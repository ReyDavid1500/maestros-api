spring:
  profiles:
    active: dev

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: false

  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    hikari:
      connection-timeout: 3000
      idle-timeout: 600000
      max-lifetime: 1800000
      maximum-pool-size: 20

  data:
    mongodb:
      uri: ${MONGODB_URI}
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  tomcat:
    connection-timeout: 5000ms
    keep-alive-timeout: 20000ms
    max-connections: 8192
    threads:
      max: 200
      min-spare: 10

app:
  azure:
    storage-base-url: ${AZURE_STORAGE_BASE_URL:}

logging:
  level:
    root: INFO
